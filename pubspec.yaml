name: pos_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 >3.8.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  pdf: ^3.11.0
  printing: ^5.12.0
  # State Management & Network
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0
  dio: ^5.7.0
  
  # Data Models & JSON
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  
  # Utilities
  google_fonts: ^8.0.2
  intl: ^0.20.2
  fl_chart: ^1.2.0
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  image_picker: ^1.2.1
  flutter_timezone: ^5.1.0
  timezone: ^0.11.0
  window_manager: ^0.5.1
  flutter_secure_storage: ^10.1.0
  uuid: ^4.5.3
  file_picker: ^8.1.7
  xml: ^6.5.0

  # UI & Design
  flutter_animate: ^4.5.0
  gap: ^3.0.1
  skeletonizer: ^2.1.3
  phosphor_flutter: ^2.1.0

  # Offline-first / Drift
  drift: ^2.22.0
  sqlite3_flutter_libs: ^0.5.27
  path_provider: ^2.1.5
  path: ^1.9.0
  connectivity_plus: ^6.0.5
  qr_flutter: ^4.1.0
  lottie: ^3.1.2

dependency_overrides:
  phosphor_flutter:
    path: patches/phosphor_flutter
  # Force latest patch versions of Android sub-packages to eliminate KGP warnings.
  image_picker_android: ^0.8.13+19
  shared_preferences_android: ^2.4.25
  url_launcher_android: ^6.3.32

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generators (The "Build" tools)
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0+1
  freezed: ^3.2.3
  json_serializable: ^6.9.0
  
  # Web Support
  build_web_compilers: ^4.0.12

  # Offline-first / Drift
  drift_dev: ^2.22.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/success_animation.json