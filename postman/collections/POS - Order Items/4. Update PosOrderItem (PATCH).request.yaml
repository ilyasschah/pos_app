$kind: http-request
name: 4. Update PosOrderItem (PATCH)
description: Updates an existing item. Make sure to change the 'id' in the JSON
  body to a real item ID!
url: "{{baseUrl}}/api/PosOrderItem?companyId={{companyId}}"
method: PATCH
headers:
  Content-Type: application/json
queryParams:
  companyId: "{{companyId}}"
body:
  type: json
  content: |-
    {
      "id": 1,
      "quantity": 3.0,
      "price": 15.50,
      "discount": 5.0,
      "discountType": 1,
      "discountAppliedType": 1,
      "comment": "Extra cheese, absolutely no onions"
    }
order: 4000
